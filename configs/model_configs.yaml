# ============================================================
# Model Configurations — SVG Scaling Laws
# ============================================================
# 5 decoder-only transformer sizes.
# Non-embedding param counts (no token_emb / pos_emb) are approximate;
# exact counts are printed at runtime by src/model.py:print_model_summary().
#
# head_dim = d_model / n_heads must be an integer.
# ============================================================

vocab_size:  4096
max_seq_len: 1024
dropout:     0.0     # no dropout during 1-epoch scaling comparison

models:
  tiny:
    d_model:  128
    n_layers: 4
    n_heads:  4
    d_ff:     512
    approx_params: "~1M"

  small:
    d_model:  192
    n_layers: 6
    n_heads:  6
    d_ff:     768
    approx_params: "~3M"

  medium:
    d_model:  384
    n_layers: 6
    n_heads:  6
    d_ff:     1536
    approx_params: "~10M"

  large:
    d_model:  512
    n_layers: 10
    n_heads:  8
    d_ff:     2048
    approx_params: "~30M"

  xl:
    d_model:  768
    n_layers: 12
    n_heads:  12
    d_ff:     3072
    approx_params: "~88M"
